app-id: io.github.alamahant.TarotCaster
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: TarotCaster
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: tarotcaster
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/alamahant/TarotCaster.git
        tag: v1.2.3
        commit: fecb4299077c690d6a303454b672bc524b19f342